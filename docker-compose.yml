services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker

    ports:
      - "1883:1883"

    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: ingestionDB

    volumes:
      - mongo_data:/data/db

    restart: unless-stopped

volumes:
  mongo_data: